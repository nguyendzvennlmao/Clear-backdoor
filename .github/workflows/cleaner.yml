name: ArisNetwork Java Rebuilder
on: 
  push:
    paths:
      - '**.jar'
  workflow_dispatch:

jobs:
  decompile-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decompile and Rebrand
        run: |
          mkdir -p src_temp
          mkdir -p output
          
          # 1. Tải bộ dịch ngược CFR
          wget https://www.benf.org/other/cfr/cfr-0.152.jar -O cfr.jar

          for plugin in *.jar; do
            echo "--- Đang phẫu thuật: $plugin ---"
            
            # 2. Dịch ngược file JAR sang mã nguồn Java (.java)
            java -jar cfr.jar "$plugin" --outputdir src_temp
            
            # 3. Xóa các package mã độc trong source code vừa dịch ngược
            rm -rf src_temp/com/thiccindustries
            rm -rf src_temp/javassist
            
            # 4. Đổi tên Package & Class trong toàn bộ mã nguồn
            # Tìm và thay thế chuỗi trong các file .java
            find src_temp -type f -name "*.java" -exec sed -i 's/org\.shyamstudio\.donutTPA/me\.aris\.ArisTPA\.ArisTPA/g' {} +
            find src_temp -type f -name "*.java" -exec sed -i 's/DonutTPA/ArisTPA/g' {} +

            # 5. Sắp xếp lại thư mục theo chuẩn Package mới
            mkdir -p src_rebuild/me/aris/ArisTPA/ArisTPA
            # Di chuyển code từ thư mục cũ sang mới (nếu tồn tại)
            if [ -d "src_temp/org/shyamstudio/donutTPA" ]; then
              cp -r src_temp/org/shyamstudio/donutTPA/* src_rebuild/me/aris/ArisTPA/ArisTPA/
              # Đổi tên file Java chính
              mv src_rebuild/me/aris/ArisTPA/ArisTPA/DonutTPA.java src_rebuild/me/aris/ArisTPA/ArisTPA/ArisTPA.java || true
            fi

            # 6. Biên dịch (Compile) lại từ Java sang Class
            # Lưu ý: Cần các thư viện (lib) của Minecraft/Spigot để build không lỗi
            # Ở đây mình sẽ đóng gói lại source sạch để bạn tự build hoặc dùng script nén
            
            cd src_rebuild
            zip -r "../ArisTPA_Source_Clean.zip" .
            cd ..
            
            mv ArisTPA_Source_Clean.zip output/ArisTPA_Source_VennLMAO.zip
          done

      - name: Upload Clean Source
        uses: actions/upload-artifact@v4
        with:
          name: ArisTPA-Source-Code
          path: output/
