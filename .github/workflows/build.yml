name: Build-Source

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - [cite_start]uses: actions/checkout@v4 [cite: 22]
      - name: Set up JDK 21
        [cite_start]uses: actions/setup-java@v4 [cite: 22]
        with:
          java-version: '21'
          distribution: 'temurin'
          [cite_start]cache: maven [cite: 22]
      - name: Build with Maven
        run: mvn -B package
